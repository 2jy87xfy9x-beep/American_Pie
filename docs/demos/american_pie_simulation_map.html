const LEVER_MAP = {
  irony: ['irony'],
  allegiance: ['allegiance'],
  complicity: ['complicity'],
  horror: ['horror'],
  stakes: ['stakes'],
};

let activeFilter = 'all';

function filterLever(key, btn) {
  activeFilter = key;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderEras();
}

function toggleEra(id) {
  const body = document.getElementById('era-body-' + id);
  const chev = document.getElementById('era-chev-' + id);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function toggleArticle(id) {
  const detail = document.getElementById('art-detail-' + id);
  const expand = document.getElementById('art-expand-' + id);
  detail.classList.toggle('open');
  expand.classList.toggle('open');
}

function voiceTag(v) {
  const cfg = VOICES[v] || VOICES['GOV'];
  return `<span class="article-voice-tag" style="background:${cfg.bg};color:${cfg.text}">${cfg.label}</span>`;
}

function tickerDots(state) {
  const cfg = TICKER_STATES[state] || TICKER_STATES['calm'];
  const dots = cfg.dots.map(c => `<span class="ticker-dot" style="background:${c}"></span>`).join('');
  return `<div class="ticker-bar">
    <span class="ticker-label">Ticker</span>
    <div class="ticker-dots">${dots}</div>
    <span class="ticker-desc">${cfg.desc}</span>
  </div>`;
}

const ERA_COLORS = {
  1: '#9FE1CB', 2: '#FAC775', 3: '#FAC775',
  4: '#E24B4A', 5: '#E24B4A', 6: '#F09595',
  7: '#85B7EB', 8: '#9FE1CB', 9: '#9FE1CB',
};

function eraMatchesFilter(era) {
  if (activeFilter === 'all') return true;
  return era.leverKey.includes(activeFilter) || era.articles.some(a => a.lever.includes(activeFilter));
}

function renderEras() {
  const list = document.getElementById('era-list');
  const filteredEras = ERAS.filter(eraMatchesFilter);
  let totalArticles = 0;
  ERAS.forEach(e => totalArticles += e.articles.length);
  document.getElementById('count-label').textContent = `${filteredEras.length} eras · ${totalArticles} articles`;
  
  if (filteredEras.length === 0) {
    list.innerHTML = '<div class="no-match">No eras match this filter.</div>';
    return;
  }
  
  list.innerHTML = filteredEras.map(era => {
    const filteredArts = activeFilter === 'all' ? era.articles : era.articles.filter(a => a.lever.includes(activeFilter));
    const dot = ERA_COLORS[era.id] || '#D3D1C7';

    const articlesHtml = filteredArts.length === 0 ? '' : `
      <div class="articles-section">
        <div class="section-title">Articles (${filteredArts.length})</div>
        ${filteredArts.map(a => {
          const artId = `era${era.id}-art${a.num}`;
          const levers = a.lever.map(l => `<span class="detail-pill">${l}</span>`).join('');
          return `
          <div class="article-row" onclick="toggleArticle('${artId}')">
            <div class="article-header">
              ${voiceTag(a.voice)}
              <div class="article-title">${a.title}</div>
              <div class="article-expand" id="art-expand-${artId}">▶</div>
            </div>
            <div class="article-detail" id="art-detail-${artId}">
              <div class="detail-block">
                <div class="detail-label">Emotion</div>
                <div class="detail-text">${a.emotion}</div>
              </div>
              <div class="detail-block">
                <div class="detail-label">Hidden lesson</div>
                <div class="detail-text">${a.lesson}</div>
              </div>
              <div class="detail-block">
                <div class="detail-label">Reveal block</div>
                <div class="detail-text">${a.reveal}</div>
              </div>
              <div class="detail-block">
                <div class="detail-label">Ghost tracks</div>
                <div class="detail-text">${a.ghost}</div>
              </div>
              <div class="detail-block" style="grid-column: 1 / -1">
                <div class="detail-label">UI / production note</div>
                <div class="detail-text">${a.ui_note}</div>
              </div>
              <div class="detail-block" style="grid-column: 1 / -1">
                <div class="detail-label">Active levers</div>
                <div>${levers}</div>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>`;

    const uiHtml = `
      <div class="ui-block">
        <div class="ui-block-header">UI state · what you see</div>
        <div class="ui-block-body">
          ${tickerDots(era.ticker)}
          ${era.ui.map(u => `<div class="ui-row"><div class="ui-dot" style="background:${u.dot}"></div><div>${u.text}</div></div>`).join('')}
        </div>
      </div>`;

    return `
    <div style="${activeFilter !== 'all' && !era.leverKey.includes(activeFilter) ? 'opacity:.55' : ''}">
      <div class="era-header" onclick="toggleEra(${era.id})">
        <span class="era-label" style="background:${dot}20;color:${dot === '#D3D1C7' ? '#5F5E5A' : dot.replace('8','4')}">Era ${era.id}</span>
        <div>
          <div class="era-name">${era.name} <span style="font-weight:400;color:var(--color-text-tertiary)">— ${era.date}</span></div>
        </div>
        <span class="era-temp">${era.temp}</span>
        <span class="era-chevron" id="era-chev-${era.id}">▶</span>
      </div>
      <div class="era-body" id="era-body-${era.id}">
        <div class="era-meta">
          <div class="meta-block">
            <div class="meta-label">Entering feeling</div>
            <div class="meta-val">${era.entering}</div>
          </div>
          <div class="meta-block">
            <div class="meta-label">Leaving feeling</div>
            <div class="meta-val">${era.leaving}</div>
          </div>
          <div class="meta-block">
            <div class="meta-label">Key variable · key decision</div>
            <div class="meta-val">${era.variables}<br><span style="color:var(--color-text-tertiary)">${era.decisions}</span></div>
          </div>
        </div>
        ${uiHtml}
        ${articlesHtml}
      </div>
    </div>`;
  }).join('');
}

renderEras();
</script>
